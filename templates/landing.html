<!DOCTYPE html>
<html>
<head>
    <title>Aether Investigations</title>

    <style>

    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial, Helvetica, sans-serif;
    }

    body{

        background:linear-gradient(135deg,#020617,#0f172a,#1e293b);
        color:white;
        height:100vh;

        display:flex;
        justify-content:center;
        align-items:center;

        overflow:hidden;
    }

    .overlay{

        text-align:center;
        animation:fadeIn 2s;
    }

    h1{

        font-size:70px;
        letter-spacing:5px;
        color:#38bdf8;

        text-shadow:0 0 20px cyan;
    }

    h3{

        margin-top:15px;
        color:#cbd5e1;
        font-weight:normal;
    }

    .btn{

        display:inline-block;

        margin-top:50px;

        padding:18px 45px;

        background:#2563eb;

        color:white;

        text-decoration:none;

        border-radius:12px;

        font-size:22px;

        transition:.3s;

    }

    .btn:hover{

        transform:scale(1.1);

        background:#1d4ed8;

    }

    @keyframes fadeIn{

        from{

            opacity:0;
            transform:translateY(40px);

        }

        to{

            opacity:1;
            transform:translateY(0);

        }

    }

    </style>

</head>

<body data-bgm-src="{{ url_for('static', filename='audio/bgm.mp3') }}">

<div class="overlay">

<h1>AETHER</h1>

<h1>INVESTIGATIONS</h1>

<h3>"The truth always leaves a trail..."</h3>

<a href="/briefing" class="btn">

▶ START INVESTIGATION

</a>

</div>
<script src="{{ url_for('static', filename='audio/bgm.js') }}"></script>
</body>

</html>
